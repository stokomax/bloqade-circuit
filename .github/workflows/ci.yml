name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
  - cron: '00 01 * * *'
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Install a specific version of uv.
          version: "0.8.4"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install the project
        run: uv sync --dev --all-extras --no-extra pyqrack-cuda --no-extra pyqrack-opencl --no-extra qrb
      - name: Install qrackbind from GitHub releases (qrb extra, Python 3.12+ only)
        # The qrackbind wheel is not yet on PyPI. The abi3 wheel targets cp312+
        # so we only install it on Python 3.12. When qrackbind is published to
        # PyPI, remove this step and drop --no-extra qrb from the sync above.
        if: matrix.python-version == '3.12'
        run: >
          uv pip install
          "https://github.com/stokomax/qrackbind/releases/download/v0.2.2/qrackbind-0.2.2-cp312.cp313.cp314-abi3-manylinux_2_34_x86_64.whl"
      - name: Run tests
        # For example, using `pytest`
        run: uv run just coverage
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml # optional
          fail_ci_if_error: true # optional (default = false)
          verbose: true # optional (default = false)
          token: ${{ secrets.CODECOV_TOKEN }} # required
      - name: Archive code coverage results
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage-report
          path: coverage.xml
          retention-days: 2
  post:
    runs-on: ubuntu-latest
    needs: build
    if: github.event.pull_request
    steps:
        - uses: actions/checkout@v6
        - name: download covearge
          uses: actions/download-artifact@v8
          with:
            name: code-coverage-report
        - name: check coverage
          run: |
            if [ -f coverage.xml ]; then
              echo "Coverage file exists"
            else
              echo "Coverage file does not exist"
              exit 1
            fi
        - name: post covearge
          uses: orgoro/coverage@v3.3
          with:
            coverageFile: coverage.xml
            token: ${{ secrets.GITHUB_TOKEN }}
